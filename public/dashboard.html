<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flick Flip - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="sidebar">
        <div class="nav-link active"><a href="dashboard.html">🏠 Dashboard</a></div>
        <div class="nav-link"><a href="leaderboard.html">🏆 Leaderboard</a></div>
        <div class="nav-link"><a href="flashcards.html">📚 Flashcards</a></div>
        <div class="nav-link"><a href="market.html">🛒 Market</a></div>
        <div class="nav-link"><a href="settings.html">⚙️ Settings</a></div>

        <div class="reset-timer">

        </div>

    <div id="stat-box-container">

        </div>

            <div id="total-users-count" class="stat-number">Loading...</div>
            <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-box">
            <div class="stat-number">67</div>
            <div class="stat-label">New Messages</div>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script> 
    <script type="module" src="js/main.js"></script>
